  <header class="w-full border-b bg-white sticky top-0 z-10">

      <h1 class="text-2xl font-bold">[Me-Search Report]</h1>
    </div>
  </header>

  <main class="max-w-[1600px] mx-auto px-6 py-6 grid grid-cols-12 gap-6">

      <div class="bg-white rounded-2xl shadow p-4 space-y-5">
        <div>
          <h2 class="text-base font-semibold mb-2">학과 선택</h2>
          <div id="deptList" class="flex flex-wrap gap-2"></div>
          <p class="text-xs text-slate-500 mt-2">블록을 선택하면 강조 상태가 유지됩니다.</p>
        </div>
        <div>
          <h2 class="text-base font-semibold mb-2">아이디 선택</h2>
          <div id="idList" class="flex flex-wrap gap-2 max-h-64 overflow-auto pr-1 scrollbar-thin"></div>
          <p class="text-xs text-slate-500 mt-2">학과를 먼저 선택하면 아이디가 나열됩니다.</p>
        </div>
        <div class="border-t pt-4">
          <h2 class="text-base font-semibold mb-2">보기 옵션</h2>
          <label class="inline-flex items-center gap-2 text-sm">
            <input id="toggleStar" type="checkbox" class="accent-blue-600" checked>
            <span>펜타그램(별 윤곽) 오버레이</span>
          </label>
        </div>
      </div>
    </aside>

      <div class="bg-white rounded-2xl shadow p-4">
        <h2 class="text-lg font-semibold mb-4">개인 프로파일</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="border rounded-xl p-3">
            <div class="flex items-center justify-between mb-2">

            </div>
            <div class="h-[480px]"><canvas id="chartIdentity"></canvas></div>

const AXES = {
      identity: ['전념확신','넓게탐색','반추적탐색','전념동일시','깊게탐색'],
      motivation: ['내재적','동일시조절','내사조절','외적조절','무동기'],
      big5: ['개방성','성실성','신경성','외향성','친화성']
    };

    const PentagramOverlay = {
      id: 'pentagramOverlay',
      afterDatasetsDraw(chart) {
        const showStar = document.getElementById('toggleStar').checked;
        if (!showStar) return;
        const meta = chart.getDatasetMeta(0);
        if (!meta || !meta.data || meta.data.length !== 5) return;
        const ctx = chart.ctx;
        const pts = meta.data.map(el => ({ x: el.x, y: el.y }));
        const order = [0,2,4,1,3,0];
        ctx.save(); ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(30,41,59,0.6)';
        ctx.beginPath(); ctx.moveTo(pts[order[0]].x, pts[order[0]].y);
        for (let i=1;i<order.length;i++) { const p = pts[order[i]]; ctx.lineTo(p.x,p.y); }
        ctx.stroke(); ctx.restore();
      }
    };
    Chart.register(PentagramOverlay);

    function radarOptions(labels) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'bottom' },
          tooltip: {
            enabled: true,
            callbacks: {
              afterTitle: function(context) {
                try {
                  const label = context[0].label;
                  const desc = pointLabelDescriptions[label];
                  return desc ? '\n' + desc : '';
                } catch (e) { return ''; }
              }
            }
          }
        },
        scales: {
          r: {
            min: 1, max: 5,
            ticks: { stepSize: 1, backdropColor: 'transparent' },
            grid: { circular: false },
            angleLines: { color: 'rgba(148,163,184,0.35)' },
            pointLabels: { color: '#0f172a', font: { size: 13 } }
          }
        },
        elements: { line: { borderWidth: 2 }, point: { radius: 3 } }
      };
    }

    const ctxIdentity = document.getElementById('chartIdentity').getContext('2d');
    const ctxMotivation = document.getElementById('chartMotivation').getContext('2d');
    const ctxBig5 = document.getElementById('chartBig5').getContext('2d');
    let chartIdentity, chartMotivation, chartBig5;

    function createCharts() {
      const base = [1,1,1,1,1];
      chartIdentity = new Chart(ctxIdentity, {
        type: 'radar',
        data: {
          labels: AXES.identity,
          datasets: [
            { label: '일반 정체성', data: base, fill: true, backgroundColor: 'rgba(59,130,246,0.12)', borderColor: 'rgba(37,99,235,1)' },
            { label: '교직 정체성', data: base, fill: true, backgroundColor: 'rgba(99,102,241,0.12)', borderColor: 'rgba(79,70,229,1)' }
          ]
        },
        options: radarOptions(AXES.identity)
      });

      chartMotivation = new Chart(ctxMotivation, {
        type: 'radar',
        data: {
          labels: AXES.motivation,
          datasets: [
            { label: '일반 동기', data: base, fill: true, backgroundColor: 'rgba(16,185,129,0.12)', borderColor: 'rgba(5,150,105,1)' },
            { label: '교직 동기', data: base, fill: true, backgroundColor: 'rgba(45,212,191,0.12)', borderColor: 'rgba(14,165,233,1)' }
          ]
        },
        options: radarOptions(AXES.motivation)
      });

      chartBig5 = new Chart(ctxBig5, {
        type: 'radar',
        data: {
          labels: AXES.big5,
          datasets: [
            { label: 'Big5', data: base, fill: true, backgroundColor: 'rgba(234,179,8,0.12)', borderColor: 'rgba(202,138,4,1)' }
          ]
        },
        options: radarOptions(AXES.big5)
      });
    }

    function updateCharts(sample) {
      chartIdentity.data.datasets[0].data = sample.identity_general;
      chartIdentity.data.datasets[1].data = sample.identity_teacher;
      chartIdentity.update();

      chartMotivation.data.datasets[0].data = sample.motivation_general;
      chartMotivation.data.datasets[1].data = sample.motivation_teacher;
      chartMotivation.update();

      chartBig5.data.datasets[0].data = sample.big5;
      chartBig5.update();
    }

    const deptList = document.getElementById('deptList');
    const idList = document.getElementById('idList');
    let currentDept = null; let currentId = null;

    function highlightActive(container, activeBtn) {
      Array.from(container.children).forEach(el => el.classList.remove('is-active'));
      if (activeBtn) activeBtn.add('is-active');
    }

    function renderDeptButtons() {
      deptList.innerHTML='';
      Object.keys(DATA).forEach(dept => {
        const btn = document.createElement('button');
        btn.textContent = dept;
        btn.className = 'px-3 py-1.5 rounded-full border text-sm hover:bg-slate-100';
        btn.addEventListener('click', ()=>{
          currentDept = dept; currentId = null;
          Array.from(deptList.children).forEach(el=>el.classList.remove('is-active'));
          btn.classList.add('is-active');
          renderIdButtons(dept);
          const firstId = Object.keys(DATA[dept].ids)[0];
          if (firstId) selectId(firstId, idList.querySelector('button'));
        });
        deptList.appendChild(btn);
      });
    }

    function renderIdButtons(dept) {
      idList.innerHTML = '';
      const ids = Object.keys(DATA[dept]?.ids || {});
      ids.forEach((id, idx)=>{
        const btn = document.createElement('button');
        btn.textContent = id;
        btn.className = 'px-3 py-1.5 rounded-full border text-sm hover:bg-slate-100';
        btn.addEventListener('click', ()=> selectId(id, btn));
        idList.appendChild(btn);
        if (idx===0) { Array.from(idList.children).forEach(el=>el.classList.remove('is-active')); btn.classList.add('is-active'); }
      });
    }

    function selectId(id, btnEl) {
      currentId = id;
      if (btnEl) { Array.from(idList.children).forEach(el=>el.classList.remove('is-active')); btnEl.classList.add('is-active'); }
      const sample = DATA[currentDept]?.ids?.[currentId];
      if (sample) updateCharts(sample);
    }

    document.getElementById('toggleStar').addEventListener('change', ()=>{
      chartIdentity.update(); chartMotivation.update(); chartBig5.update();
    });

    // Boot
    createCharts();
    renderDeptButtons();
    const firstDept = Object.keys(DATA)[0];
    if (firstDept) {
      const firstDeptBtn = deptList.querySelector('button');
      if (firstDeptBtn) firstDeptBtn.click();
    }
  </script>
</body>
</html>
